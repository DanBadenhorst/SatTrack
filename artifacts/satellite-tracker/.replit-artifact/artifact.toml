kind = "web"
previewPath = "/"
title = "Satellite Tracker"
version = "1.0.0"
id = "artifacts/satellite-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23059

[services.development]
run = "pnpm --filter @workspace/satellite-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/satellite-tracker", "run", "build" ]
run = "pnpm --filter @workspace/satellite-tracker run start"

[services.env]
PORT = "23059"
